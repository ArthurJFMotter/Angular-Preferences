<div class="preferences-fab-container" [class.expanded]="isExpanded">
    
  <!-- Theme Mode -->
  <div class="fab-option">
    <button mat-mini-fab 
        [matTooltip]="themeTooltip()" 
        (click)="preferencesService.toggleDarkMode()"
        [attr.aria-label]="'Current theme mode: ' + preferencesService.themeMode()">
        <mat-icon>{{ themeIcon() }}</mat-icon>
    </button>
  </div>

  <!-- Contrast Mode -->
  <div class="fab-option">
    <button mat-mini-fab 
        [matTooltip]="contrastTooltip()" 
        (click)="preferencesService.toggleHighContrastMode()"
        [color]="preferencesService.contrastMode() === 'high' ? 'accent' : ''"
        [attr.aria-label]="'Current contrast mode: ' + preferencesService.contrastMode()">
        <mat-icon>{{ contrastIcon() }}</mat-icon>
    </button>
  </div>

  <!-- Color Filter -->
  <div class="fab-option">
    <button mat-mini-fab matTooltip="Color Deficiency Filter" 
        [matMenuTriggerFor]="filterMenu" aria-label="Open color filter options">
        <mat-icon>visibility</mat-icon>
    </button>
  </div>

  <!-- Theme Color -->
  <div class="fab-option">
    <button mat-mini-fab matTooltip="Theme Color" 
        [matMenuTriggerFor]="themeMenu" aria-label="Open theme color options">
        <mat-icon>palette</mat-icon>
    </button>
  </div>

  <!-- Reset -->
  <div class="fab-option">
    <button mat-mini-fab matTooltip="Reset Defaults" color="warn"
        (click)="preferencesService.resetToDefaults(); handleReset()"
        aria-label="Reset to default settings">
        <mat-icon>restart_alt</mat-icon>
    </button>
  </div>

  <!-- Main Toggle Button -->
  <button mat-fab class="fab-toggler" color="primary" (click)="toggleExpansion()" 
      aria-label="Open accessibility and theme preferences">
      <mat-icon [class.rotate-icon]="isExpanded">settings</mat-icon>
  </button>
</div>


<!-- Filter Menu -->
<mat-menu #filterMenu="matMenu">
  <div mat-menu-item disabled>Color Vision Deficiency</div>
  <mat-divider></mat-divider>
  @for (filter of themeService.getDaltonicFilters(); track filter.id) {
    <button mat-menu-item (click)="preferencesService.setColorFilter(filter.id)">
      <div class="menu-item-row">
        @if (themeService.activeColorFilter() === filter.id) {
          <mat-icon color="accent">check</mat-icon>
        } @else {
          <mat-icon style="opacity: 0">check</mat-icon>
        }
        <span>{{ filter.displayName }}</span>
      </div>
    </button>
  }
</mat-menu>

<!-- Theme Color Menu -->
<mat-menu #themeMenu="matMenu">
  <div mat-menu-item disabled>Primary Color</div>
  <mat-divider></mat-divider>
  @for (theme of themeService.getThemes(); track theme.id) {
    <button mat-menu-item (click)="preferencesService.setTheme(theme.id)">
      <div class="theme-menu-item">
        <div class="color-dot" [style.background-color]="theme.primary"></div>
        <span>{{ theme.displayName }}</span>
        @if (themeService.currentTheme().id === theme.id) {
          <mat-icon class="check-icon">check</mat-icon>
        }
      </div>
    </button>
  }
</mat-menu>
