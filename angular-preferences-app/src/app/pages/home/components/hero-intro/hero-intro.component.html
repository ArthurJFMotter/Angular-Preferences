<div class="hero-content">
  <h1 class="display-headline">
    Design that adapts to <br />
    <span class="gradient-text">every user.</span>
  </h1>

  <p class="hero-subtext">
    Static interfaces are a thing of the past. Empower your users with granular
    control over contrast, density, typography and more.
  </p>

  <div class="hero-actions">
    <button
      mat-flat-button
      color="primary"
      class="cta-button"
      (click)="navigateToSettings()"
    >
      <mat-icon>tune</mat-icon>
      Start Customizing
    </button>
    <button mat-stroked-button class="cta-button" (click)="handleDocumentation()">
      <mat-icon>description</mat-icon>
      Documentation
    </button>
  </div>
</div>
