<mat-card class="settings-card" appearance="outlined">
  <mat-card-header>
    <div mat-card-avatar class="header-icon">
      <mat-icon aria-hidden="true">palette</mat-icon>
    </div>
    <mat-card-title>
      <div class="title-with-help">
        <h2>Appearance</h2>
        <app-help-button
          message="Customize the look and feel of the workspace, including theme colors, dark mode, and shape styling."
        ></app-help-button>
      </div>
    </mat-card-title>
  </mat-card-header>

  <mat-card-content class="card-body">
    <!-- Theme Color -->
    <div class="control-group">
      <label class="group-label">Theme Color</label>
      <div class="swatch-grid" role="radiogroup" aria-label="Theme Color">
        @for (theme of themeService.getThemes(); track theme.id) {
          <button
            type="button"
            class="color-swatch"
            role="radio"
            [attr.aria-checked]="themeService.currentTheme().id === theme.id"
            [attr.aria-label]="theme.displayName"
            [style.background-color]="theme.primary"
            [class.active]="themeService.currentTheme().id === theme.id"
            (click)="preferencesService.setTheme(theme.id)"
            [matTooltip]="theme.displayName"
          >
            @if (themeService.currentTheme().id === theme.id) {
              <mat-icon>check</mat-icon>
            }
          </button>
        }
      </div>
    </div>

    <!-- Theme Mode -->
    <div class="control-group">
      <label id="mode-label" class="group-label">Theme Mode</label>
      <mat-button-toggle-group
        class="button-toggle-group"
        aria-labelledby="mode-label"
        [value]="preferencesService.themeMode()"
        (change)="preferencesService.setThemeMode($event.value)"
      >
        <mat-button-toggle value="light">
          <mat-icon>light_mode</mat-icon> <span>Light</span>
        </mat-button-toggle>
        <mat-button-toggle value="auto">
          <mat-icon>brightness_auto</mat-icon> <span>Auto</span>
        </mat-button-toggle>
        <mat-button-toggle value="dark">
          <mat-icon>dark_mode</mat-icon> <span>Dark</span>
        </mat-button-toggle>
      </mat-button-toggle-group>
    </div>

    <!-- Corner Shape -->
    <div class="control-group">
      <div class="label-row">
        <label id="shape-label" class="group-label">Corner Shape</label>
        <span class="value-badge">{{
          shapeService.activeShape().displayName
        }}</span>
      </div>
      <div class="slider-row">
        <mat-icon class="shape-icon square-icon" aria-hidden="true"
          >crop_square</mat-icon
        >
        <mat-slider
          [min]="0"
          [max]="shapeService.getShapes().length - 1"
          step="1"
          discrete
          showTickMarks
          aria-labelledby="shape-label"
        >
          <input
            matSliderThumb
            [value]="shapeSliderIndex()"
            (valueChange)="updateShape($event)"
          />
        </mat-slider>
        <mat-icon class="shape-icon pill-icon" aria-hidden="true"
          >panorama_fish_eye</mat-icon
        >
      </div>
    </div>
  </mat-card-content>
</mat-card>
