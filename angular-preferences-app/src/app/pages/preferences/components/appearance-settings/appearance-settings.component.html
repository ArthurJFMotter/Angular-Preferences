<mat-card class="settings-card">
  <mat-card-header>
    <div mat-card-avatar class="header-icon"><mat-icon>palette</mat-icon></div>
    <mat-card-title>Appearance</mat-card-title>
  </mat-card-header>
  <mat-card-content class="card-body">
    <!-- Theme Color -->
    <div class="control-group">
      <label class="group-label">Theme Color</label>
      <div class="swatch-grid">
        @for (theme of themeService.getThemes(); track theme.id) {
          <button
            class="color-swatch"
            [style.background-color]="theme.primary"
            [class.active]="themeService.currentTheme().id === theme.id"
            (click)="preferencesService.setTheme(theme.id)"
            [matTooltip]="theme.displayName"
          >
            @if (themeService.currentTheme().id === theme.id) {
              <mat-icon>check</mat-icon>
            }
          </button>
        }
      </div>
    </div>

    <!-- Theme Mode -->
    <div class="control-group">
      <label class="group-label">Theme Mode</label>
      <mat-button-toggle-group
        class="fit-toggle full-width-toggle"
        [value]="themeService.themeMode()"
        (change)="preferencesService.setThemeMode($event.value)"
      >
        <mat-button-toggle value="light">
          <mat-icon>light_mode</mat-icon> Light
        </mat-button-toggle>
        <mat-button-toggle value="auto">
          <mat-icon>brightness_auto</mat-icon> Auto
        </mat-button-toggle>
        <mat-button-toggle value="dark">
          <mat-icon>dark_mode</mat-icon> Dark
        </mat-button-toggle>
      </mat-button-toggle-group>
    </div>

    <!-- Corner Shape -->
    <div class="control-group">
      <label class="group-label">Corner Shape</label>
      <mat-button-toggle-group
        class="fit-toggle full-width-toggle"
        [value]="shapeService.activeShape().id"
        (change)="preferencesService.setShape($event.value)"
      >
        <mat-button-toggle value="sharp">
          <mat-icon>crop_square</mat-icon> Square
        </mat-button-toggle>

        <mat-button-toggle value="md">
          <mat-icon>rounded_corner</mat-icon> Rounded
        </mat-button-toggle>

        <mat-button-toggle value="full">
          <mat-icon>circle</mat-icon> Pill
        </mat-button-toggle>
      </mat-button-toggle-group>
    </div>
  </mat-card-content>
</mat-card>
