<div class="page-container">

    <!-- LEFT COLUMN: SETTINGS -->
    <div class="settings-column">

        <header class="page-header">
            <h1>Configuration</h1>
            <p class="subtitle">Customize the look and feel of your workspace.</p>
        </header>

        <!-- Components -->
        <app-appearance-settings></app-appearance-settings>
        <app-accessibility-settings></app-accessibility-settings>
        <app-typography-settings></app-typography-settings>
        <app-notification-settings></app-notification-settings>

        <!-- Actions / Reset -->
        <div class="actions-container">
            <mat-divider></mat-divider>
            <div class="actions-row">
                <button mat-stroked-button color="warn" (click)="handleReset()">
                    <mat-icon>restart_alt</mat-icon>
                    Reset to Defaults
                </button>
            </div>
        </div>

    </div>

    <!-- RIGHT COLUMN: LIVE PREVIEW -->
    <div class="preview-column">
        <app-live-preview></app-live-preview>
    </div>

</div>
